<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Form</title>
</head>
<body>

    <h2>Hobbies</h2>

    <form method="POST" id = 'form' action="/submit">
        <!-- Name field -->
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <!-- Textbox (message) -->
        <label for="message">Hobbies:</label><br>
        <textarea id="message" name="message" rows="4" cols="40" required></textarea><br><br>

        <!-- Submit button -->
        <button id='submit' type="submit">Send</button>
    </form>
    <script src="/static/formSubmit.js"></script>
</body>
</html>
